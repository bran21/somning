<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deploy Tic Tac Toe Contract</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f1115;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
            width: 100%;
        }

        button {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #8b949e;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .success {
            color: #3fb950 !important;
        }

        .error {
            color: #f85149 !important;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Deploy Tic Tac Toe Contract</h2>
        <p>Click below to deploy the compiled `TicTacToe.sol` smart contract securely using your connected wallet.</p>

        <button id="deployBtn">Connect Wallet & Deploy Contract</button>

        <div id="status">Ready.</div>
    </div>

    <script type="module" src="/src/deploy.js"></script>
</body>

</html>
